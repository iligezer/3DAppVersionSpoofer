name: Build iOS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos and build
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: './theos'

      - name: Build package
        run: |
          export THEOS=./theos
          make package FINALPACKAGE=1

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: 3dappversionspoofer-deb
          path: packages/*.deb
