name: Build iOS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ldid
        run: brew install ldid

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      - name: Download SDK
        run: |
          mkdir -p $HOME/theos/sdks
          cd $HOME/theos/sdks
          curl -L -o iPhoneOS16.0.sdk.zip https://github.com/xybp888/iOS-SDKs/raw/master/iPhoneOS16.0.sdk.zip
          unzip iPhoneOS16.0.sdk.zip
          rm iPhoneOS16.0.sdk.zip

      - name: Build
        run: make package FINALPACKAGE=1

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: 3dappversionspoofer-deb
          path: packages/*.deb
